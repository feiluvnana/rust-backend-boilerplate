[config]
skip_core_tasks = true

[tasks.run]
description = "Run the backend application with hot-reloading"
command = "cargo"
args = ["watch", "-x", "run"]

[tasks.check]
description = "Fast compilation check"
command = "cargo"
args = ["check"]

[tasks.fmt]
description = "Format code"
command = "cargo"
args = ["fmt", "--all"]

[tasks.lint]
description = "Run clippy lints"
command = "cargo"
args = ["clippy", "--all-targets", "--", "-D", "warnings"]

[tasks.ci]
description = "Run full CI pipeline locally (fmt + lint)"
dependencies = ["fmt-check", "lint"]

[tasks.fmt-check]
description = "Check formatting without modifying code"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

# ─── Docker ───────────────────────────────────────
[tasks.docker-up]
description = "Start the application container"
command = "docker"
args = ["compose", "up", "-d"]

[tasks.docker-down]
description = "Stop all containers and remove volumes"
command = "docker"
args = ["compose", "down", "-v"]

[tasks.docker-build]
description = "Build the Docker image"
command = "docker"
args = ["compose", "build"]

[tasks.docker-logs]
description = "Tail container logs"
command = "docker"
args = ["compose", "logs", "-f"]

# ─── Database ─────────────────────────────────────
[tasks.db-up]
description = "Run database migrations via sea-orm-cli"
command = "sea-orm-cli"
args = ["migrate", "-d", "database/migrations", "up"]

[tasks.db-down]
description = "Rollback the last migration via sea-orm-cli"
command = "sea-orm-cli"
args = ["migrate", "-d", "database/migrations", "down"]

[tasks.db-migration]
description = "Create a new migration (usage: cargo make db-migration xxx)"
command = "sea-orm-cli"
args = ["migrate", "-d", "database/migrations", "generate", "${@}"]

[tasks.db-entity]
description = "Generate entity models from database"
script = '''
# Load .env file if it exists
if [ -f .env ]; then
  export $(grep -v '^#' .env | xargs)
fi
if [ -z "$DATABASE_URL" ]; then
  echo "DATABASE_URL is not set"
  exit 1
fi
echo "Generating entities from $DATABASE_URL..."
sea-orm-cli generate entity --database-url "$DATABASE_URL" -o database/models
'''
script_runner = "@shell"

[tasks.env-setup]
description = "Generate .env from .env.example"
script = '''
if [ ! -f .env ]; then
  cp .env.example .env
  echo "Created .env from .env.example"
else
  echo ".env already exists"
fi
'''
script_runner = "@shell"
